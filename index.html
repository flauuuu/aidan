<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Soundboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Custom Soundboard & Media Player</h1>
        <p>Load a video, or use the sound pads below. For pads, hover to edit.</p>
    </header>
    <main>
        <div id="media-player-container">
            <div id="video-wrapper">
                <div id="player-container">
                    <video id="video-player" controls>
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
            <div class="media-controls">
                <input type="url" id="video-url-input" placeholder="Enter YouTube URL">
                <button id="load-url-btn" class="media-button">Load URL</button>
                <span class="separator-text">OR</span>
                <input type="file" id="video-file-input" accept="video/*" style="display: none;">
                <label for="video-file-input" class="media-button">Load Local Video</label>
                <button id="fullscreen-btn" class="media-button">Fullscreen</button>
                <button id="manage-video-queue-btn" class="media-button">Manage Queue</button>
            </div>
        </div>

        <div id="song-loader-container">
            <h2>Song Loader</h2>
            <div id="audio-player-wrapper">
                <!-- Audio player (native or iframe) will be inserted here -->
            </div>
            <div class="media-controls">
                <input type="url" id="song-url-input" placeholder="Enter YouTube, SoundCloud, Suno, or Spotify URL">
                <button id="load-song-btn" class="media-button">Load Song</button>
                <span class="separator-text">OR</span>
                <input type="file" id="song-file-input" accept="audio/mp3,audio/ogg" style="display: none;">
                <label for="song-file-input" class="media-button">Load Audio File</label>
                <button id="manage-song-queue-btn" class="media-button">Manage Queue</button>
            </div>
        </div>

        <div id="soundboard-container">
            <!-- Sound pads will be generated by JavaScript -->
        </div>
        <button id="stop-all-btn" class="media-button">Stop All Sounds</button>
    </main>

    <div id="queue-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="queue-modal-title">Queue</h2>
                <button id="close-queue-modal-btn" class="close-button">&times;</button>
            </div>
            <ul id="queue-list">
                <!-- Queue items will be populated here -->
            </ul>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
